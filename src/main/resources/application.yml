spring:
  application:
    name: ai-board

server:
  port: 8080



# Qwen (通义千问) API 配置 - 请将 your-api-key 替换为您的阿里云 DashScope API Key
# 获取地址: https://dashscope.console.aliyun.com/
langchain4j:
  qwen:
    api-key: your-api-key
    model-name: qwen-flash  # 纯文本、低延迟，走 Generation 接口；比 qwen-plus/max 更快
    max-tokens: 2048
    temperature: 0.5
    enable-thinking: true  # 关闭可进一步提速，但前端不再展示思考过程
