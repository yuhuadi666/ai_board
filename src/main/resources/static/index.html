<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
  <title>心情留言墙 · 像素驿站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg0: #1a1028;
      --brick1: #6b3fa0;
      --brick2: #4a2c6e;
      --mortar: #120a1c;
      --panel: #2a1f3d;
      --panel-border: #e8c84a;
      --accent: #ff6b9d;
      --accent2: #5ce1e6;
      --text: #f5e6ff;
      --muted: #9b7ec4;
      --shadow: #0d0614;
      --light-gold: #ffd54a;
      --light-core: #fff3a0;
      /* 全页字号基准 */
      --fs-body: 14px;
      --fs-note-time: 11px;
      --fs-note-mood: 14px;
      --fs-note-reply: 12px;
      --fs-stack-time: 9px;
      --fs-stack-mood: 11px;
      --fs-stack-reply: 10px;
      --fs-empty: 13px;
      --fs-label: 12px;
      --fs-input: 13px;
      --fs-btn: 13px;
      --fs-err: 12px;
      --grid-cap: 8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Press Start 2P", monospace;
      font-size: var(--fs-body);
      line-height: 1.75;
      color: var(--text);
      background: var(--bg0);
      background-image:
        linear-gradient(180deg, rgba(0,0,0,0.35) 0%, transparent 40%),
        repeating-linear-gradient(
          90deg,
          var(--brick1) 0px,
          var(--brick1) 48px,
          var(--mortar) 48px,
          var(--mortar) 52px
        ),
        repeating-linear-gradient(
          0deg,
          var(--brick2) 0px,
          var(--brick2) 24px,
          var(--mortar) 24px,
          var(--mortar) 28px
        );
      background-size: 100% 100%, 52px 28px, 52px 28px;
      background-position: 0 0, 0 0, 26px 14px;
      image-rendering: pixelated;
    }

    .scanlines {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      opacity: 0.06;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 2px,
        #000 2px,
        #000 3px
      );
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .wall-stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 12px 12px 8px;
      position: relative;
    }

    .wall-lights {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: min(38%, 220px);
      pointer-events: none;
      z-index: 3;
      overflow: hidden;
    }

    .lamp {
      position: absolute;
      top: 0;
      width: 16px;
      height: 12px;
      background: #2a2a2a;
      border: 2px solid #111;
      box-shadow: 2px 2px 0 var(--shadow);
    }

    .lamp::after {
      content: "";
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 7px;
      background: linear-gradient(180deg, var(--light-core) 0%, var(--light-gold) 100%);
      border: 2px solid #b8860b;
    }

    .lamp-left { left: calc(22% - 8px); }
    .lamp-right { left: calc(78% - 8px); }

    .beam {
      position: absolute;
      top: 20px;
      width: min(42vw, 200px);
      height: calc(100% + 120px);
      transform-origin: 50% 0;
      background: radial-gradient(
        ellipse 70% 35% at 50% 0%,
        rgba(255, 248, 180, 0.65) 0%,
        rgba(255, 210, 80, 0.28) 35%,
        rgba(255, 180, 40, 0.08) 55%,
        transparent 72%
      );
      filter: blur(1px);
      mix-blend-mode: screen;
      animation: beam-flicker 4s ease-in-out infinite;
    }

    .beam-left {
      left: calc(22% - min(21vw, 100px));
    }

    .beam-right {
      left: calc(78% - min(21vw, 100px));
      animation-delay: 1.3s;
    }

    @keyframes beam-flicker {
      0%, 100% { opacity: 1; }
      48% { opacity: 0.92; }
      50% { opacity: 0.98; }
      52% { opacity: 0.88; }
    }

    .wall {
      flex: 1;
      position: relative;
      z-index: 1;
      margin-top: 8px;
      border: 4px solid #3d2f52;
      box-shadow:
        inset 0 0 0 3px #2a1f35,
        inset 0 24px 100px rgba(255, 210, 100, 0.12),
        inset 0 48px 120px rgba(255, 200, 60, 0.08),
        0 0 0 4px var(--shadow),
        8px 8px 0 var(--shadow);
      background:
        linear-gradient(180deg, rgba(90, 70, 50, 0.35) 0%, transparent 25%),
        linear-gradient(180deg, rgba(255, 220, 120, 0.06) 0%, transparent 40%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(0,0,0,0.06) 3px,
          rgba(0,0,0,0.06) 4px
        ),
        #5c4d42;
      background-size: 100% 100%, 100% 100%, 100% 4px, 100% 100%;
      overflow-x: hidden;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      min-height: 200px;
      padding: 12px 10px 16px;
    }

    /* 第 9 条及更早：叠在墙顶 */
    .wall-stack {
      position: relative;
      flex-shrink: 0;
      min-height: 0;
      height: 0;
      overflow: visible;
      z-index: 15;
    }

    .wall-stack.has-overflow {
      height: auto;
      min-height: clamp(100px, 20vw, 130px);
      margin-bottom: 12px;
      overflow: visible;
    }

    .note-shell--pile {
      position: absolute;
      left: 50%;
      top: 0;
      width: min(calc(100% - 8px), 260px);
      max-width: 260px;
      --pile-n: 0;
      transform:
        translateX(calc(-50% + var(--pile-n) * 5px - 8px))
        translateY(calc(var(--pile-n) * 6px))
        rotate(calc(-5deg + var(--pile-n) * 2deg));
      z-index: calc(60 - var(--pile-n));
    }

    .note--pile {
      padding: 12px 14px 14px;
      transform-origin: 50% 80%;
      box-shadow:
        4px 6px 0 rgba(0,0,0,0.4),
        0 1px 0 rgba(255,255,255,0.12) inset;
      border: 3px solid rgba(0,0,0,0.28);
      max-height: 150px;
      overflow: hidden;
      transform: none;
    }

    .note--pile .time { font-size: var(--fs-stack-time); margin-bottom: 8px; line-height: 1.5; }
    .note--pile .mood {
      font-size: var(--fs-stack-mood);
      line-height: 1.85;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .note--pile .reply {
      font-size: var(--fs-stack-reply);
      line-height: 1.85;
      padding-top: 6px;
      border-top: 2px dashed rgba(0,0,0,0.15);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .note--pile::before {
      content: "";
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 42px;
      height: 16px;
      background: rgba(255,255,255,0.35);
      border: 2px solid rgba(0,0,0,0.2);
      opacity: 0.9;
    }

    /* 主区：最多 8 张错落 */
    .wall-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px 12px;
      align-content: start;
      justify-items: center;
      padding: 8px 6px 12px;
      overflow-y: auto;
      position: relative;
      z-index: 2;
    }

    @media (min-width: 520px) {
      .wall-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px 14px;
      }
    }

    .note-shell {
      position: relative;
      width: 100%;
      max-width: 268px;
      justify-self: center;
      --rot: 0deg;
      --tx: 0px;
      --ty: 0px;
      --z: 1;
    }

    .note-shell:not(.note-shell--pile) {
      z-index: var(--z);
    }

    .note-shell:focus {
      outline: none;
    }

    .note-shell:focus-visible {
      outline: 3px dashed var(--accent2);
      outline-offset: 4px;
    }

    .note-shell:not(.note-shell--pile) .note {
      transform: rotate(var(--rot)) translate(var(--tx), var(--ty));
      transition:
        transform 0.45s cubic-bezier(0.34, 1.35, 0.64, 1),
        box-shadow 0.4s ease;
    }

    .note-shell--pile .note {
      transition:
        transform 0.45s cubic-bezier(0.34, 1.35, 0.64, 1),
        box-shadow 0.4s ease;
    }

    .note-shell:hover:not(.note-shell--pile) .note,
    .note-shell:focus-within:not(.note-shell--pile) .note {
      transform:
        rotate(var(--rot))
        translate(var(--tx), var(--ty))
        scale(1.03);
      box-shadow:
        6px 14px 0 rgba(0,0,0,0.28),
        0 2px 0 rgba(255,255,255,0.2) inset;
    }

    .note-shell--pile:hover .note,
    .note-shell--pile:focus-within .note {
      transform: scale(1.03);
      box-shadow:
        6px 14px 0 rgba(0,0,0,0.32),
        0 2px 0 rgba(255,255,255,0.15) inset;
    }

    .note-curl {
      position: absolute;
      right: 6px;
      bottom: 6px;
      width: 40px;
      height: 40px;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transition:
        opacity 0.28s ease,
        transform 0.5s cubic-bezier(0.34, 1.45, 0.64, 1);
      background: linear-gradient(
        225deg,
        rgba(255, 255, 255, 0.95) 0%,
        rgba(245, 220, 170, 0.9) 42%,
        rgba(90, 70, 55, 0.45) 88%
      );
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
      transform-origin: 100% 100%;
      transform: rotate(0deg) scale(0.75);
      box-shadow: -3px -3px 8px rgba(0,0,0,0.22);
      border-bottom: 2px solid rgba(0,0,0,0.12);
      border-right: 2px solid rgba(0,0,0,0.12);
    }

    .note-shell:hover .note-curl,
    .note-shell:focus-within .note-curl {
      opacity: 1;
      transform: rotate(-22deg) scale(1.08);
    }

    .note-shell--done .note-curl {
      opacity: 0 !important;
      pointer-events: none;
    }

    .note-actions {
      position: absolute;
      left: 50%;
      top: 46%;
      z-index: 40;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transform: translate(-50%, -50%) scale(0.35);
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.25s ease,
        transform 0.35s cubic-bezier(0.34, 1.45, 0.64, 1);
    }

    .note-shell:hover .note-actions,
    .note-shell:focus-within .note-actions {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .note-done,
    .note-trash {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      padding: 0;
      margin: 0;
      border: 3px solid #1a1a1a;
      border-radius: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 2px #5d4037,
        4px 4px 0 rgba(0,0,0,0.45);
      transition: background 0.2s, color 0.2s, transform 0.12s ease;
    }

    .note-done {
      background: #1b5e20;
      color: #c8e6c9;
    }

    .note-done:hover {
      background: #2e7d32;
      color: #fff;
    }

    .note-trash {
      background: #2d2d2d;
      color: #b0bec5;
    }

    .note-trash:hover {
      background: #c62828;
      color: #fff;
    }

    .note-done:active,
    .note-trash:active {
      transform: scale(0.9);
    }

    .note-shell--done .note-actions {
      display: none !important;
    }

    .note-shell--done:hover .note-curl,
    .note-shell--done:focus-within .note-curl {
      opacity: 0;
    }

    .note-shell--done:not(.note-shell--pile):hover .note,
    .note-shell--done:not(.note-shell--pile):focus-within .note {
      transform: rotate(var(--rot)) translate(var(--tx), var(--ty));
      box-shadow:
        4px 5px 0 rgba(0,0,0,0.35),
        0 1px 0 rgba(255,255,255,0.15) inset;
    }

    .note-shell--done.note-shell--pile:hover .note,
    .note-shell--done.note-shell--pile:focus-within .note {
      transform: none;
      box-shadow:
        4px 6px 0 rgba(0,0,0,0.4),
        0 1px 0 rgba(255,255,255,0.12) inset;
    }

    .note-done-stamp {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 6;
      pointer-events: none;
    }

    .note-done-stamp-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1.15;
      font-weight: normal;
      color: #1b5e20;
      border: 3px solid #2e7d32;
      padding: 6px 8px 8px;
      background: rgba(220, 255, 220, 0.96);
      box-shadow:
        2px 2px 0 rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.5);
      transform: rotate(12deg);
    }

    .note-done-stamp-inner small {
      font-size: 8px;
      margin-top: 2px;
      letter-spacing: 0.05em;
    }

    .trash-ico,
    .check-ico {
      width: 26px;
      height: 26px;
      display: block;
      image-rendering: pixelated;
    }

    .bingo-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2500;
      overflow: hidden;
    }

    .bingo-word {
      position: absolute;
      left: 0;
      top: 0;
      margin: 0;
      padding: 0;
      font-family: "Press Start 2P", monospace;
      font-size: clamp(28px, 9vw, 52px);
      color: #ffeb3b;
      text-shadow:
        4px 4px 0 #e65100,
        -2px -2px 0 #fff,
        0 0 20px rgba(255, 235, 59, 0.8);
      white-space: nowrap;
      transform: translate(-50%, -50%) scale(0.15) rotate(-6deg);
      opacity: 0;
      animation: bingo-word-pop 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes bingo-word-pop {
      0% {
        transform: translate(-50%, -50%) scale(0.1) rotate(-10deg);
        opacity: 0;
      }
      35% {
        transform: translate(-50%, -50%) scale(1.12) rotate(4deg);
        opacity: 1;
      }
      55% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(1.08) rotate(0deg);
        opacity: 0;
      }
    }

    .bingo-bit {
      position: absolute;
      left: 0;
      top: 0;
      width: 10px;
      height: 10px;
      margin: -5px 0 0 -5px;
      border: 2px solid rgba(0,0,0,0.35);
      animation: bingo-bit-fly 0.85s ease-out forwards;
    }

    @keyframes bingo-bit-fly {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(calc(var(--dx) * 1px), calc(var(--dy) * 1px)) rotate(540deg) scale(0.2);
        opacity: 0;
      }
    }

    .bingo-flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at var(--bx, 50%) var(--by, 40%), rgba(255, 248, 180, 0.55) 0%, transparent 55%);
      animation: bingo-flash-fade 0.5s ease-out forwards;
      z-index: 2499;
      pointer-events: none;
    }

    @keyframes bingo-flash-fade {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    .note {
      width: 100%;
      padding: 14px 14px 16px;
      box-shadow:
        4px 5px 0 rgba(0,0,0,0.35),
        0 1px 0 rgba(255,255,255,0.15) inset;
      border: 3px solid rgba(0,0,0,0.25);
      position: relative;
      z-index: 1;
      image-rendering: pixelated;
    }

    .note::before {
      content: "";
      position: absolute;
      top: -9px;
      left: 50%;
      transform: translateX(-50%);
      width: 44px;
      height: 17px;
      background: rgba(255,255,255,0.35);
      border: 2px solid rgba(0,0,0,0.2);
      opacity: 0.9;
    }

    .note-c0 { background: linear-gradient(145deg, #fff9e6 0%, #ffe9a8 100%); color: #3d2914; }
    .note-c1 { background: linear-gradient(145deg, #ffe8f0 0%, #ffc4d8 100%); color: #4a2030; }
    .note-c2 { background: linear-gradient(145deg, #e8fff4 0%, #b8f0d8 100%); color: #1a3d2e; }
    .note-c3 { background: linear-gradient(145deg, #e8f4ff 0%, #c4dcff 100%); color: #1e3048; }
    .note-c4 { background: linear-gradient(145deg, #f5e8ff 0%, #dcc4ff 100%); color: #301848; }

    .note .time {
      font-size: var(--fs-note-time);
      opacity: 0.7;
      margin-bottom: 10px;
      line-height: 1.55;
    }

    .note .mood {
      font-size: var(--fs-note-mood);
      line-height: 1.9;
      word-break: break-word;
      margin-bottom: 12px;
    }

    .note .reply {
      font-size: var(--fs-note-reply);
      line-height: 1.9;
      word-break: break-word;
      padding-top: 10px;
      border-top: 2px dashed rgba(0,0,0,0.15);
      opacity: 0.95;
    }

    .empty-state {
      grid-column: 1 / -1;
      width: 100%;
      text-align: center;
      padding: 40px 16px;
      font-size: var(--fs-empty);
      color: rgba(255, 245, 220, 0.6);
      line-height: 2.2;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
    }

    .panel {
      flex-shrink: 0;
      background: var(--panel);
      border-top: 4px solid var(--panel-border);
      box-shadow: 0 -4px 0 var(--shadow);
      padding: 16px 16px 20px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    .panel-label {
      font-size: var(--fs-label);
      color: var(--accent);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-label::before {
      content: "▶";
      color: var(--accent2);
    }

    textarea {
      width: 100%;
      min-height: 104px;
      padding: 14px 16px;
      font-family: "Press Start 2P", monospace;
      font-size: var(--fs-input);
      line-height: 1.85;
      color: var(--text);
      background: var(--bg0);
      border: 3px solid #554466;
      resize: vertical;
      image-rendering: pixelated;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent2);
      box-shadow: 0 0 0 2px var(--accent);
    }

    textarea::placeholder {
      color: var(--muted);
      opacity: 0.75;
      font-size: var(--fs-input);
    }

    .btn-row {
      margin-top: 14px;
      display: flex;
      justify-content: flex-end;
    }

    button.submit {
      font-family: "Press Start 2P", monospace;
      font-size: var(--fs-btn);
      padding: 14px 22px;
      cursor: pointer;
      color: var(--bg0);
      background: var(--accent2);
      border: none;
      border-bottom: 5px solid #2a8a8e;
      border-right: 5px solid #2a8a8e;
      box-shadow: 0 0 0 3px var(--shadow);
      image-rendering: pixelated;
    }

    button.submit:hover { filter: brightness(1.1); }

    button.submit:active {
      transform: translate(2px, 2px);
      border-bottom-width: 3px;
      border-right-width: 3px;
    }

    button.submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .err {
      margin-top: 12px;
      font-size: var(--fs-err);
      line-height: 1.8;
      color: #ff8a80;
    }

    @media (min-width: 400px) {
      :root {
        --fs-body: 15px;
        --fs-note-time: 12px;
        --fs-note-mood: 15px;
        --fs-note-reply: 13px;
        --fs-stack-mood: 12px;
        --fs-stack-reply: 11px;
        --fs-empty: 14px;
        --fs-label: 13px;
        --fs-input: 14px;
        --fs-btn: 14px;
        --fs-err: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="page">
    <div class="wall-stage">
      <div class="wall-lights" aria-hidden="true">
        <div class="lamp lamp-left"></div>
        <div class="lamp lamp-right"></div>
        <div class="beam beam-left"></div>
        <div class="beam beam-right"></div>
      </div>
      <div class="wall" id="wall">
        <div class="wall-stack" id="overflowPile" aria-hidden="true"></div>
        <div class="wall-grid" id="list"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">新留言</div>
      <textarea id="moodInput" maxlength="500" placeholder="今天发生了什么？此刻的心情是……"></textarea>
      <div class="btn-row">
        <button type="button" class="submit" id="sendBtn">发送心情</button>
      </div>
      <div class="err" id="errBox" hidden></div>
    </div>
  </div>

  <div id="bingoOverlay" class="bingo-overlay" aria-hidden="true"></div>

  <script>
    const STORAGE_KEY = "ai_board_visitor_id";
    const GRID_CAP = 8;

    const NOTE_ROT = [-5, 4, -3, 6, -4, 3, -2, 5];
    const NOTE_TX = [-8, 10, -5, 12, -10, 6, -4, 9];
    const NOTE_TY = [6, -4, 8, -6, 5, -7, 7, -5];

    function getVisitorId() {
      let id = localStorage.getItem(STORAGE_KEY);
      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem(STORAGE_KEY, id);
      }
      return id;
    }

    function fmtTime(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString("zh-CN", { hour12: false });
      } catch {
        return iso;
      }
    }

    function trashSvg() {
      return `<svg class="trash-ico" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="currentColor" d="M6 8h12v2H6V8zm2 3h2v9H8v-9zm4 0h2v9h-2v-9zm4 0h2v9h-2v-9z"/><path fill="currentColor" d="M9 4h6l1 2h6v2H2V6h6l1-2zm1.2 0l-.5 1h4.6l-.5-1h-3.6z"/></svg>`;
    }

    function checkSvg() {
      return `<svg class="check-ico" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="currentColor" d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>`;
    }

    function buildNoteShell(e, colorIdx, opts) {
      const shellClass = opts.shellClass || "";
      const shellStyle = opts.shellStyle || "";
      const articleClass = opts.articleClass || "";
      const articleStyle = opts.articleStyle || "";
      const done = !!e.completed;
      const doneShell = done ? " note-shell--done" : "";
      const stampHtml = done
        ? `<div class="note-done-stamp" aria-hidden="true"><div class="note-done-stamp-inner">✓<small>完成</small></div></div>`
        : "";
      const actionsHtml = done
        ? ""
        : `<div class="note-actions">
        <button type="button" class="note-done" data-entry-id="${e.id}" title="标记完成" aria-label="标记完成">${checkSvg()}</button>
        <button type="button" class="note-trash" data-entry-id="${e.id}" title="撕掉这条留言" aria-label="删除这条留言">${trashSvg()}</button>
      </div>`;
      return `<div class="note-shell ${shellClass}${doneShell}" tabindex="0" ${shellStyle}>
        <span class="note-curl" aria-hidden="true"></span>
        <article class="note note-c${colorIdx} ${articleClass}" ${articleStyle}>
          ${stampHtml}
          <div class="time">${fmtTime(e.createdAt)}</div>
          <div class="mood">${escapeHtml(e.content)}</div>
          <div class="reply">${escapeHtml(e.warmReply)}</div>
        </article>
        ${actionsHtml}
      </div>`;
    }

    function renderList(items) {
      const gridEl = document.getElementById("list");
      const pileEl = document.getElementById("overflowPile");

      if (!items.length) {
        pileEl.classList.remove("has-overflow");
        pileEl.innerHTML = "";
        pileEl.style.paddingBottom = "";
        pileEl.setAttribute("aria-hidden", "true");
        gridEl.innerHTML = '<div class="empty-state">墙上还没有便签<br/>在下方写一条贴上墙吧</div>';
        return;
      }

      const gridItems = items.slice(0, GRID_CAP);
      const overflowItems = items.slice(GRID_CAP);

      if (overflowItems.length) {
        pileEl.classList.add("has-overflow");
        pileEl.setAttribute("aria-hidden", "false");
        const pileDepth = Math.min(overflowItems.length * 14, 200);
        pileEl.style.paddingBottom = `${pileDepth}px`;
        pileEl.innerHTML = overflowItems
          .map((e, i) => {
            const globalIdx = GRID_CAP + i;
            const c = globalIdx % 5;
            return buildNoteShell(e, c, {
              shellClass: "note-shell--pile",
              shellStyle: `style="--pile-n: ${i}"`,
              articleClass: "note--pile"
            });
          })
          .join("");
      } else {
        pileEl.classList.remove("has-overflow");
        pileEl.innerHTML = "";
        pileEl.style.paddingBottom = "";
        pileEl.setAttribute("aria-hidden", "true");
      }

      gridEl.innerHTML = gridItems
        .map((e, i) => {
          const rot = NOTE_ROT[i % NOTE_ROT.length];
          const tx = NOTE_TX[i % NOTE_TX.length];
          const ty = NOTE_TY[i % NOTE_TY.length];
          const c = i % 5;
          return buildNoteShell(e, c, {
            shellStyle: `style="--rot:${rot}deg;--tx:${tx}px;--ty:${ty}px;--z:${10 + i}"`
          });
        })
        .join("");
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function playBingo(clientX, clientY) {
      const cx = clientX ?? window.innerWidth / 2;
      const cy = clientY ?? window.innerHeight / 3;
      const ov = document.getElementById("bingoOverlay");

      const flash = document.createElement("div");
      flash.className = "bingo-flash";
      flash.style.setProperty("--bx", `${(cx / window.innerWidth) * 100}%`);
      flash.style.setProperty("--by", `${(cy / window.innerHeight) * 100}%`);
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 520);

      const word = document.createElement("div");
      word.className = "bingo-word";
      word.textContent = "BINGO!";
      word.style.left = `${cx}px`;
      word.style.top = `${cy}px`;
      ov.appendChild(word);

      const colors = ["#ff5252", "#448aff", "#69f0ae", "#ffd740", "#e040fb", "#ff6e40", "#ff6b9d", "#5ce1e6"];
      for (let i = 0; i < 32; i++) {
        const bit = document.createElement("div");
        bit.className = "bingo-bit";
        bit.style.background = colors[i % colors.length];
        const ang = (Math.PI * 2 * i) / 32 + (Math.random() - 0.5) * 0.35;
        const dist = 65 + Math.random() * 100;
        bit.style.setProperty("--dx", Math.cos(ang) * dist);
        bit.style.setProperty("--dy", Math.sin(ang) * dist);
        bit.style.left = `${cx}px`;
        bit.style.top = `${cy}px`;
        ov.appendChild(bit);
      }

      setTimeout(() => {
        word.remove();
        ov.querySelectorAll(".bingo-bit").forEach((n) => n.remove());
      }, 1000);
    }

    async function completeEntry(entryId, clientX, clientY) {
      const err = document.getElementById("errBox");
      err.hidden = true;
      try {
        const r = await fetch(
          `/api/board/entry/${encodeURIComponent(entryId)}/complete?visitorId=${encodeURIComponent(getVisitorId())}`,
          { method: "PATCH" }
        );
        if (!r.ok) {
          const t = await r.text();
          throw new Error(t || "标记失败");
        }
        playBingo(clientX, clientY);
        const data = await r.json();
        renderList(data.entries || []);
      } catch (e) {
        err.textContent = e.message || "标记失败";
        err.hidden = false;
      }
    }

    async function deleteEntry(entryId) {
      const err = document.getElementById("errBox");
      err.hidden = true;
      try {
        const r = await fetch(
          `/api/board/entry/${encodeURIComponent(entryId)}?visitorId=${encodeURIComponent(getVisitorId())}`,
          { method: "DELETE" }
        );
        if (r.status === 409) {
          throw new Error("已完成留言不可删除");
        }
        if (r.status === 404) {
          throw new Error("留言不存在");
        }
        if (!r.ok) {
          const t = await r.text();
          throw new Error(t || "删除失败");
        }
        const data = await r.json();
        renderList(data.entries || []);
      } catch (e) {
        err.textContent = e.message || "删除失败";
        err.hidden = false;
      }
    }

    document.getElementById("wall").addEventListener("click", (ev) => {
      const doneBtn = ev.target.closest(".note-done");
      if (doneBtn) {
        ev.preventDefault();
        ev.stopPropagation();
        completeEntry(doneBtn.dataset.entryId, ev.clientX, ev.clientY);
        return;
      }
      const trashBtn = ev.target.closest(".note-trash");
      if (!trashBtn) return;
      ev.preventDefault();
      ev.stopPropagation();
      deleteEntry(trashBtn.dataset.entryId);
    });

    async function loadHistory() {
      const vid = getVisitorId();
      const r = await fetch("/api/board", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ visitorId: vid })
      });
      if (!r.ok) throw new Error("加载失败");
      const data = await r.json();
      renderList(data.entries || []);
    }

    async function sendMood() {
      const input = document.getElementById("moodInput");
      const btn = document.getElementById("sendBtn");
      const err = document.getElementById("errBox");
      err.hidden = true;
      const content = input.value.trim();
      if (!content) {
        err.textContent = "先写点什么吧。";
        err.hidden = false;
        return;
      }
      btn.disabled = true;
      try {
        const r = await fetch("/api/board", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ visitorId: getVisitorId(), content })
        });
        if (!r.ok) {
          const t = await r.text();
          throw new Error(t || "发送失败");
        }
        const data = await r.json();
        input.value = "";
        renderList(data.entries || []);
      } catch (e) {
        err.textContent = e.message || "网络错误";
        err.hidden = false;
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById("sendBtn").addEventListener("click", sendMood);
    loadHistory().catch(() => {
      document.getElementById("overflowPile").classList.remove("has-overflow");
      document.getElementById("overflowPile").innerHTML = "";
      document.getElementById("list").innerHTML =
        '<div class="empty-state">无法连接服务器<br/>请确认后端已启动</div>';
    });
  </script>
</body>
</html>
